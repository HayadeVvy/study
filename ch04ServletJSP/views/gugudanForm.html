<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>구구단 입력</title>
</head>
<body>
	<h2>구구단 단 입력</h2>
	<!-- 
	action : 데이터를 전송할 서버 주소
	method : 데이터 전송 방식
	 -->
	<form method="get" action="/ch04ServletJSP/gugudan">
		단 <input type="number" name="dan"
		     min="2" max="9"><br>
		<input type="submit" value="전송">
	</form>
</body>
</html>
