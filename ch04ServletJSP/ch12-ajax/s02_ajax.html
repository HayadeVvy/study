<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>jQuery를 이용한 비동기 통신 구현</title>
<script type="text/javascript" 
              src="../js/jquery-3.7.1.min.js"></script>
<script type="text/javascript">
/*
 * AJAX(Asynchronous Javascript And XML)
 * 자바스크립트와 XML를 이용한 비동기 통신
 */
	$(document).ready(function(){
		//서버에 데이터를 전송하고 서버에서 보내준 텍스트 데이터를
		//처리
		$.ajax({
			url:'myParam.jsp', //요청 URL
			data:{name:'하하',age:21}, //서버에 전송할 데이터
			success:function(param){
				//서버의 응답이 성공했을 때 호출
				$('body').append(param);
			}
		});
	});
</script>              
</head>
<body>

</body>
</html>
