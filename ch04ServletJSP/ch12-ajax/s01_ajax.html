<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>jQuery를 이용한 비동기 통신 구현</title>
<script type="text/javascript" 
              src="../js/jquery-3.7.1.min.js"></script>
<script type="text/javascript">
/*
 * AJAX(Asynchronous Javascript And XML)
 * 자바스크립트와 XML를 이용한 비동기 통신
 */
	$(document).ready(function(){
		//text 정보를 읽어 옴
		$.ajax({
			url:'myString.jsp',
			success:function(param){
				//서버의 응답이 성공했을 때 호출
				$('body').append(param);
			}
		});
	});
</script>              
</head>
<body>

</body>
</html>
