<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery 연결</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script type="text/javascript">
        //문서가 준비 완료되면 매개변수로 전달된 함수를 실행하라는 의미
       //=$(document).ready(function(){});
       $(function(){
            $('#btn1').on('click',function(){
                $('#dog').fadeIn('slow');
            });
            $('#btn2').on('click',function(){
                $('#dog').fadeOut(1000);
            });
            $('#btn3').on('click',function(){
                $('#dog').fadeToggle('fast');
            });
       });
    </script>
</head>
<body>
    <button id="btn1">fadeIn</button>
    <button id="btn2">fadeOut</button>
    <button id="btn3">fadeToggle</button>
    <br>
    <img id="dog" src="../files/dog.png"
       width="120" height="100" style="display:none">
</body>
</html>
