<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if문</title>
</head>
<body>
    <script type="text/javascript">
                    //선택창
                    //확인 클릭 -> true
                    //취소 클릭 -> false
        var cancel = confirm('삭제하시겠습니까?');
        if(cancel){
            document.write('삭제되었습니다.');
        }else{
            document.write('취소되었습니다.');
        }
    </script>
</body>
</html>
