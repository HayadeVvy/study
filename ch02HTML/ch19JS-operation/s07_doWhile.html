<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>do~while</title>
</head>
<body>
    <script type="text/javascript">
        var value = 0;

        while(value++ < 5){
            document.write('Hello World<br>');
        }

        document.write('---------<br>');
        value = 0;

        do{
            document.write(
                'Hello JavaScript<br>');
        }while(value++ < 5);

    </script>
</body>
</html>
