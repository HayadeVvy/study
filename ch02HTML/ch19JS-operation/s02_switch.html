<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>switch</title>
</head>
<body>
    <script type="text/javascript">
        var type = prompt(
            '당신의 혈액형을 입력하세요!','');
        switch(type){
            case 'A': document.write('A형');
                      break;
            case 'B': document.write('B형');
                      break;
            case 'AB': document.write('AB형');
                       break;
            case 'O' : document.write('O형');
                       break;
            default : document.write(
                         '새로운 혈액형입니다.');                                 
        }    
    </script>
</body>
</html>
