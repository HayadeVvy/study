<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for</title>
</head>
<body>
    <script type="text/javascript">
        var dan = prompt('구구단 단 입력','');

        document.write(dan + '단<br>');
        document.write('------------<br>');
           //초기식;조건식;증감식
        for(var i=1;i<=9;i++){
            document.write(
                dan + '*' + i + '=' + dan*i + '<br>');
        }

    </script>
</body>
</html>
