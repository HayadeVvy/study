<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>form</title>
    </head>
    <body>
        <h3>폼 하위 태그의 필드 및 속성 사용</h3>
        <form action="do.html" method="get">
            <!--
            fieldset : 폼을 그룹핑하는 역할
            legend : 제목 지정
            -->
            <fieldset>
                <legend>프로젝트 정보</legend>
                <ul>
                    <li>
                        <!--label : 입력 창에 '아이디' 나
                        '비밀번호'처럼 붙여 놓은 텍스트를 말함
                        label 태그를 사용하면 폼 요소와 
                        레이블 텍스트가 서로 연결되어 있다는 것을
                        브라우저가 알 수 있음-->
                        <label for="name">이름</label>
                        <!--
                        required : 입력 필수 지정
                        autofocus : 페이지 로드시 자동 포커스 지정
                        -->
                        <input type="text" name="name"
                               id="name" required autofocus><br>
                    </li>
                    <li>
                        <label for="priority">중요도</label>
                        <!--
                        range : 슬라이드 막대로 표시하는 숫자 필드
                        -->
                        <input type="range" name="priority"
                         id="priority" min="0" max="10"
                         value="0" oninput="result.value=priority.value">
                         <!--
                         output : 계산의 결과를 삽입
                         -->
                         <output name="result"></output>
                    </li>
                    <li>
                        <label for="hours">예상 시간</label>
                        <!--number : 숫자 필드-->
                        <input type="number" name="hours"
                        id="hours" min="0" max="24">     
                    </li>
                    <li>
                        <label for="start_date">시작 날짜</label>
                        <!--date : 날짜 필드-->
                        <input type="date" name="start_date"
                            id="start_date">
                    </li>
                    <li>
                        <label for="start_time">시작 시간</label>
                        <!--time : 시작 시간-->
                        <input type="time" name="start_time"
                            id="start_time">
                    </li>
                    <li>
                        <label for="email">이메일</label>
                        <!--email : 이메일 필드-->
                        <input type="email" name="email"
                            id="email">
                    </li>
                    <li>
                        <label for="url">URL</label>
                        <!--url : URL 필드-->
                        <input type="url" name="url" 
                             id="url">
                    </li>
                    <li>
                        <label for="search">검색</label>
                        <!--search : 검색 필드-->
                        <input type="search" name="search"
                           id="search"> 
                    </li>
                    <li>
                        <input type="submit">
                    </li>
                </ul>
            </fieldset>
        </form>
    </body>
</html>
