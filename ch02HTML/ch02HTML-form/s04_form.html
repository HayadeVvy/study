<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>로그인</title>
    </head>
    <body>
        <form action="login.jsp" 
                          method="post">
            <fieldset>
                <legend>로그인</legend>
                <ul>
                    <li>
                        <label for="userid">아이디</label>
                        <input type="text" name="id"
                          id="userid" required autofocus
                          autocomplete="off">
                    </li>
                    <li>
                        <label for="pwd">비밀번호</label>
                        <input type="password" required
                           id="pwd" name="pwd">
                    </li>
                    <li>
                        <label for="level">회원 등급</label>
                        <input id="level" type="text"
                          value="준회원" readonly>
                    </li>
                    <li>
                        <input type="submit" value="전송">
                    </li>
                </ul>
            </fieldset>
        </form>
    </body>
</html>
