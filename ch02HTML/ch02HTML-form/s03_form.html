<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>회원가입</title>
    </head>
    <body>
        <form action="signup.html" method="post">
            <fieldset>
                <legend>새 계정을 만듭니다</legend>
                <ul>
                    <li>
                        <label for="name">이름</label>
                        <!--placeholder : 힌트 기능-->
                        <input type="text" name="name"
                          id="name" placeholder="이름 입력">
                    </li>
                    <li>
                        <label for="id">아이디</label>
                        <!--autocomplete : 자동 완성 제어-->
                        <input type="text" name="id"
                          id="id" placeholder="아이디 입력"
                          autocomplete="off">
                    </li>
                    <li>
                        <label for="email">이메일</label>
                        <input type="email" name="email"
                          id="email" 
                          placeholder="user@example.com"
                          autocomplete="off">
                    </li>
                    <li>
                        <label for="job">직업</label>
                        <input type="text" name="job" list="job">
                        <datalist id="job">
                            <option value="학생">
                            <option value="의사">
                            <option value="변호사">
                            <option value="프로그래머">
                        </datalist>
                    </li>
                    <li>
                        <input type="submit" value="전송">
                    </li>
                </ul>
            </fieldset>
        </form>
    </body>
</html>
