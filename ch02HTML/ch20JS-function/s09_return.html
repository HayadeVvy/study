<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>return</title>
</head>
<body>
    <script type="text/javascript">
        function returnTest(){
            alert('문장 A');
            return; //함수를 빠져나감
            alert('문장 B');
        }
        //함수 호출
        returnTest();
    </script>
</body>
</html>
