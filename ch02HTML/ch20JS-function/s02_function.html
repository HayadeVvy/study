<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>함수</title>
</head>
<body>
    <script type="text/javascript">
        //함수의 이름이 같을 경우 마지막
        //함수 호출
        function 함수(){
            document.write('함수 A<br>');
        }
        function 함수(){
            document.write('함수 B<br>');
        }
        //함수 호출
        함수();
        document.write('--------<br>');

        //함수 호이스팅
        함수2();
        //선언적 함수 정의
        function 함수2(){
            document.write('함수2<br>');
        }

        document.write('========<br>');
        //익명함수의 경우도 같은 변수명을
        //사용하면 마지막에 정의한 함수가
        //호출
        var 함수3 = function(){
            document.write('함수 C<br>');
        };

        var 함수3 = function(){
            document.write('함수 D<br>');
        };
        //함수 호출
        함수3();

        document.write('--------<br>');

        함수4();

        //익명 함수로 함수를 정의하면
        //함수 호이스팅이 발생하는 것이
        //아니라 변수 호이스팅이 발생.
        //익명 함수 정의
        var 함수4 = function(){
            document.write('함수4');
        };

   </script> 
</body>
</html>
