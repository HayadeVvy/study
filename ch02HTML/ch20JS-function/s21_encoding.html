<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인코딩/디코딩함수</title>
</head>
<body>
    <script type="text/javascript">
        /*
        함수 이름           설명
        escape(uri)     적절한 정도로 인코딩함
        unescape(uri)   적절한 정도로 디코딩함
        encodeURI(uri)  최소한의 문자만 인코딩함
        decodeURI(uri)  최소한의 문자만 디코딩함
        encodeURIComponent(uri) 대부분의 문자를 인코딩
        decodeURIComponent(uri) 대부분의 문자를 디코딩
        */
       //인코딩할 URI
       const URI = 'http://test.com?test=한글입니다.';
       //출력할 문자열
       let output = '';
       output += '*escape()<br>';
       output += escape(URI) + '<br><br>';
       output += '*encodeURI()<br>';
       output += encodeURI(URI) + '<br><br>';
       output += '*encodeURIComponent()<br>';
       output += encodeURIComponent(URI);

       //출력
       document.write(output);
    </script>
</body>
</html>
