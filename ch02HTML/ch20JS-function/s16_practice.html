<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습</title>
</head>
<body>
    <script type="text/javascript">
        /*
        [실습]국어,영어,수학 성적을 promt로
        입력받아서 총점,평균,등급을 출력하는데
        총점(getSum),평균(geAvg),등급(getGrade)
        을 구하는 함수를 만들어서 사용하자
        [출력예시]
        총점 : 000
        평균 : 00
        등급 : 0
        */
       function getSum(korean,english,math){
        return korean+english+math;
       }
       function getAvg(sum){
        return sum/3;
       }
       function getGrade(avg){
        let grade;
        if(avg>=90 && avg<=100){
            grade = 'A';
        }else if(avg>=80 && avg<90){
            grade = 'B';
        }else if(avg>=70 && avg<80){
            grade = 'C';
        }else if(avg>=60 && avg<70){
            grade = 'D';
        }else{
            grade = 'F';
        }
        return grade;
       }

       let korean = prompt('국어','');
       let english = prompt('영어','');
       let math = prompt('수학','');

       if(korean < 0 || korean > 100 || 
          english < 0 || english > 100 ||
          math < 0 || math > 100){
            document.write(
                '성적은 0~100사이만 입력 가능');
       }else{
        //총점 구하기
        let sum = getSum(Number(korean),
             Number(english),Number(math));
        //평균 구하기     
        let avg = getAvg(sum);
        //등급 구하기
        let grade = getGrade(avg); 
        
        document.write(
            '총점 : ' + sum + '<br>');
        document.write(
            '평균 : ' + avg + '<br>');
        document.write('등급 : ' + grade);        
       }

    </script>
</body>
</html>
