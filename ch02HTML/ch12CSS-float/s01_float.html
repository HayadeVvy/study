<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>float</title>
        <style type="text/css">
            /*
            float는 태그를 원하는 위치에
            배치할 때 사용
            */
            div#a{
                width:75%;
                background-color:pink;
                float:left;
            }
            div#b{
                width:24%;
                background-color: green;
                float:right;
            }
        </style>
    </head>
    <body>
        <div id="a">하하</div>
        <div id="b">호호</div>
    </body>
</html>
