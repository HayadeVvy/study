<!DOCTYPE html>
<html>
    <meta charset="UTF-8">
    <title>글자</title>
    <body>
        안녕하세요
        <br>
        줄바꿈시 br 태그를 사용해야 함<br>
        <!-- <b>, <strong> 태그 : 굵은 글씨-->
        <b>굵은 글씨1</b>
        <strong>굵은 글씨2</strong> 
        <br>
        <!-- <ins>태그 : 밑줄 -->
        <ins>밑줄</ins>
        <!-- <del>태그 : 취소선 -->
        <del>2,000</del>    
        <br>
        
        <!-- <i>, <em> 태그 : 이탤릭체-->
        <i>이텔릭체</i><br>
        이제는 <em>반응형 웹</em>이 
        <i>대세</i>이다.<br>    

        <!-- 태그는 중첩 가능-->
        <b>태그는 <ins>중첩</ins> 
        사용 가능</b>하다    

        <!--<span>태그 : 하나의 영역으로 묶기-->    
        <span>내용 형식</span> 
        <br>
        
        <!-- <mark> 태그 : 형광펜 효과 내기-->
        <mark>텍스트</mark> 
        
        <!--수평선-->
        <!--상대적인 수치 지정-->
        <hr size="1" width="100%">
        
        <!--절대적인 수치 지정-->
        <hr size="1" width="500">

        <!--제목 표시하기-->
        <h1>제목1</h1>
        <h2>제목2</h2>
        <h3>제목3</h3>
        <h4 align="left">제목4</h4>
        <h5 align="center">제목5</h5>
        <h6 align="right">제목6</h6>

        <!--<p> 태그 : 단락 만들기-->
        <p align="center"><b>가운데</b></p>
        <p align="left"><b>왼쪽</b></p>
        <p align="right"><b>오른쪽</b></p>

        <!--<div> 태그 : 블럭 레벨 태그
            텍스트(또는 이미지)를 블럭 단위로
            묶을 때-->
        <div align="center">가운데</div>
        <div align="left">왼쪽</div>
        <div align="right">오른쪽</div>    
    </body>
</html>
