<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>resize</title>
        <style type="text/css">
            p{font-size:11pt;}
            .resize{
              position:absolute;
              left:50px;
              top:20px; 
              width:200px;
              height:50px;
              padding:5px;
              border:solid 1px #06F;
              overflow:hidden;
              /*크기 변경
              가로 방향,세로 방향 모두 
              사이즈 변경 가능*/
              resize:both; 
            }
        </style>
    </head>
    <body>
        <div class="resize">
            <p>
                CSS 속성 중 resize 속성을 이용
                CSS 속성 중 resize 속성을 이용
                CSS 속성 중 resize 속성을 이용
                CSS 속성 중 resize 속성을 이용
                CSS 속성 중 resize 속성을 이용
                CSS 속성 중 resize 속성을 이용
                CSS 속성 중 resize 속성을 이용
            </p>
        </div>
    </body>
</html>
