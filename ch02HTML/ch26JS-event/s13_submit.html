<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>submit</title>
    <script type="text/javascript">
        window.onload=function(){
            const myForm = 
             document.getElementById('register_form');
            //이벤트 연결
            myForm.onsubmit=function(){
                const name = 
                    document.getElementById('name');
                if(name.value.trim()==''){
                    alert('이름을 입력하세요');
                    //공백 입력시 공백 제거
                    name.value = '';
                    name.focus();
                    return false;
                }  
                const id = 
                    document.getElementById('id');
                if(id.value.trim()==''){
                    alert('아이디를 입력하세요');
                    //공백 입력시 공백 제거
                    id.value = '';
                    id.focus();
                    return false;
                } 
                const password = 
                    document.getElementById('password');
                if(password.value.trim()==''){
                    alert('비밀번호를 입력하세요');
                    //공백 입력시 공백 제거
                    password.value = '';
                    password.focus();
                    return false;
                } 
                const phone = 
                    document.getElementById('phone');
                if(phone.value.trim()==''){
                    alert('전화번호 입력하세요');
                    //공백 입력시 공백 제거
                    phone.value = '';
                    phone.focus();
                    return false;
                }
                const zipcode = 
                    document.getElementById('zipcode');
                if(zipcode.value.trim()=='' || 
                             zipcode.value.length!=5){
                    alert('우편번호는 5자리만 입력 가능');
                    //공백 입력시 공백 제거
                    zipcode.value = '';
                    zipcode.focus();
                    return false;
                }
                const address = 
                    document.getElementById('address');
                if(address.value.trim()==''){
                    alert('주소를 입력하세요');
                    //공백 입력시 공백 제거
                    address.value = '';
                    address.focus();
                    return false;
                }
            }; 
        };
    </script>
</head>
<body>
    <form id="register_form" action="a.jsp"
                             method="post">
        <fieldset>
            <legend>회원가입</legend>
            <ul>
                <li>
                    <label for="name">이름</label>
                    <input type="text" name="name"
                     id="name" size="10" maxlength="10">
                </li>
                <li>
                    <label for="id">id</label>
                    <input type="text" name="id"
                      id="id" size="10" maxlength="10">
                </li>
                <li>
                    <label for="password">비밀번호</label>
                    <input type="password" name="password"
                     id="password" size="10" maxlength="10">
                </li>
                <li>
                    <label for="phone">전화번호</label>
                    <input type="text" name="phone" 
                     id="phone" size="10" maxlength="11">
                </li>
                <li>
                    <label for="zipcode">우편번호</label>
                    <input type="text" name="zipcode"
                     id="zipcode" size="5" maxlength="5"
                                     minlength="5">
                </li>
                <li>
                    <label for="address">주소</label>
                    <input type="text" name="address"
                      id="address" size="20">
                </li>
            </ul>
            <div align="center">
                <input type="submit" value="전송">
            </div>
        </fieldset>
    </form>
</body>
</html>
