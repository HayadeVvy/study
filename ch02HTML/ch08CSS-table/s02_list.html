<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>목록</title>
        <style type="text/css">
            ul{
               /*목록의 점 아이콘 제거*/ 
               list-style:none; 
            }
            ul li{
                /*목록이 가로로 배치*/
                display: inline;
            }
        </style>
    </head>
    <body>
        <ul>
            <li>봄</li>
            <li>여름</li>
            <li>가을</li>
            <li>겨울</li>
        </ul>
    </body>
</html>
