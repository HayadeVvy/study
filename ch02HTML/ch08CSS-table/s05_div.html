<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>div</title>
        <style type="text/css">
            div{
                width:500px;
                height:100px;
                border:solid 1px orange;
            }
            div.a{
                /*가로 정렬*/
                text-align: center;
                /*세로 정렬*/
                vertical-align: middle;
                /*
                div 공간을 테이블의 셀 공간으로
                지정해서 
                vertical-align이 적용되도록 처리
                */
                display: table-cell;
            }
            div.b{
                display: flex;
                /*가로 정렬*/
                justify-content: center;
                /*세로 정렬*/
                align-items: center;
            }
        </style>
    </head>
    <body>
        <div class="a">
            <span>하하</span>
        </div>
        <br>
        <div class="b">
            <span>호호</span>
        </div>
    </body>
</html>
