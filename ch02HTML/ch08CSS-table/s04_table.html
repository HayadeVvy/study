<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>table</title>
        <style type="text/css">
            table{
                /*테두리: 실선 두께 색상*/
                border:solid 1px orange;
                /*표 테두리를 한 줄로 표시*/
                border-collapse: collapse;
                width: 500px;
                /*
                중앙 정렬할 때 테이블의 margin을
                상하는 0px로, 좌우는 auto
                수평방향으로 남은 여백을 좌우에
                동등하게 분배한다는 의미
                */
                margin:0 auto;
                /*제목 위치 지정*/
                caption-side: bottom;
            }
            th{
                border:solid 1px orange;
                background-color: #FFCC66;
                color:#FFFFFF;
            }
            td{
                border:solid 1px orange;
                height:100px;
                /*가로 방향 정렬*/
                text-align: center;
                /*세로 방향 정렬*/
                vertical-align: top;
            }
            tr.bg td{
                color:#000000;
                background-color: #EAF2D3;
                vertical-align: bottom;
            }
            caption{
                color:#FF6600;
                font-size: 11pt;
                font-weight: bold;
                /*태그 밖 여백*/
                margin-top:5px;
            }
        </style>
    </head>
    <body>
       <table>
            <caption>table에 스타일 적용</caption>
            <tr>
                <th>번호</th>
                <th>이름</th>
                <th>직업</th>
            </tr>
            <tr>
                <td>1</td>
                <td>홍길동</td>
                <td>경찰</td>
            </tr>
            <tr class="bg">
                <td>2</td>
                <td>박문수</td>
                <td>교사</td>
            </tr>
       </table> 
    </body>
</html>
