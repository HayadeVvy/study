<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuejs</title>
</head>
<body>
    <!--Vue 애플리케이션이 적용될 영역(루트 DOM)-->
    <div id="app">
        <!--
        {{}}, v-text,v-html,v-bind 디렉티브는 모두 단방향
        데이터 바인딩을 지원함.
        사용자로부터 입력값을 받고 싶은 경우 양방향 데이터 바인딩
        을 지원하는 v-model 사용
        -->    
        <input id="a" type="text" v-model="name">  
        <br>
        입력하신 이름 : <span>{{name}}</span> 
        <!--
        v-model의 한글 처리 문제 해결
        @input="changeName" 과 같이 이벤트 핸들러 메서드를 
        등록해서 사용자가 입력한 값을 name2 데이터로 부여함
        -->  
        <h4>한글 처리 문제 해결</h4>
        <input id="b" type="text" :value="name2"
            @input="changeName">
        <br>
        입력하신 이름 : <span>{{name2}}</span>         
    </div>
    <!--Vue 라이브러리를 CDN 방식으로 로드-->
    <script type="text/javascript" src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
        //Vue 애플리케이션 생성
        Vue.createApp({
            //컴포넌트가 관리하고 추적해야 할 데이터를
            //등록할 때 사용

            //Vue 컴포넌트에서 사용하는 반응형 데이터 정의
            //반응형 데이터(Reactive Data)는 데이터가 변경되면
            //그 데이터를 사용하는 UI(View)가 자동으로 다시
            //갱신되는 데이터를 의미
            data(){
                //View에서 사용할 데이터 객체 반환
                return {
                    name:"",
                    name2:""
                }
            },
            methods:{
                changeName(e){
                    this.name2 = e.target.value;
                }
            }
        })
        //mount()
        //Vue 애플리케이션을 실제 DOM 요소에 연결
        //'#app' 요소 내부가 Vue의 관리 영역이 됨
        .mount('#app');
    </script>
</body>
</html>
