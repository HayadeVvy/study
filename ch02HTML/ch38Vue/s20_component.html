<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuejs</title>
</head>
<body>
    <!--Vue 애플리케이션이 적용될 영역(루트 DOM)-->
    <div id="app">
        <button>버튼을 클릭</button>
        <br>
        <span>num의 값은 {{num}}</span>
        
        <hr>

        <my-component></my-component>
        
    </div>
    <!--Vue 라이브러리를 CDN 방식으로 로드-->
    <script type="text/javascript" src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
        //Vue 애플리케이션 생성
       const vm = Vue.createApp({
            data(){
                //View에서 사용할 데이터 객체 반환
                return {
                    num:0
                }
            }
        })

        //전역 컴포넌트 등록
        //첫 번째 인자로 컴포넌트의 이름
        vm.component('my-component',{
            data(){
                return {
                    msg:"Hello"
                }
            },
            template:'<div>my-component 전역 컴포넌트 등록</div>'
        });
        vm.mount('#app');
    </script>
</body>
</html>
