<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuejs</title>
    <link rel="stylesheet" 
     href="https://unpkg.com/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <style type="text/css">
        body{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        .title{
            text-align: center;
            font-weight: bold;
            font-size: 20pt;
        }
        .todo-done{
            text-decoration: line-through;
        }
        .container{
            padding:10px 10px 10px 10px;
        }
        .pointer{
            cursor:pointer;
        }
    </style> 
</head>
<body>
    <!--Vue 애플리케이션이 적용될 영역(루트 DOM)-->
    <div id="app" class="container">
       <div class="card card-body bg-light">
            <div class="title">TodoList App</div>
       </div>
       <div class="card card-default">
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col">
                        <div class="input-group">
                            <input id="msg" type="text" class="form-control"
                              name="msg" placeholder="할 일을 여기에 입력!"
                              v-model.trim="todo"
                              @keyup.enter="addTodo">
                            <span class="btn btn-primary input-group-addon"
                               @click="addTodo">추가</span>  
                        </div>
                    </div>
                </div><!--end of row-->
                <div class="row">
                    <div class="col">
                        <ul class="list-group">
                            <li v-for="todoitem in todolist"
                              :key="todoitem.id" class="list-group-item"
                              :class="{'list-group-item-success':todoitem.completed}"
                              @click="toggleCompleted(todoitem.id)">
                                <span class="pointer"
                                 :class="{'todo-done':todoitem.completed}">
                                    {{todoitem.todo}} {{todoitem.completed ? "(완료)" : ""}}
                                </span> 
                                <span class="float-end badge bg-secondary pointer"
                                  @click.stop="deleteTodo(todoitem.id)">삭제</span>   
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
       </div>
    </div>
    <!--Vue 라이브러리를 CDN 방식으로 로드-->
    <script type="text/javascript" src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
        let ts = new Date().getTime();
        //Vue 애플리케이션 생성
       const vm = Vue.createApp({
            data(){
                //View에서 사용할 데이터 객체 반환
                return {
                    todo:"",
                    todolist:[
                        {id:ts,todo:"영화 보기",completed:false},
                        {id:ts+1,todo:"친구와 저녁식사",completed:true},
                        {id:ts+2,todo:"도서관 가기",completed:false},
                        {id:ts+3,todo:"음반 구입",completed:false}
                    ]
                }
            },
            methods:{
                addTodo(){//할 일 등록
                    if(this.todo.length>=2){
                        this.todolist.unshift({
                            id:new Date().getTime(),
                            todo:this.todo,
                            completed:false
                        });
                        this.todo="";
                    }
                },
                deleteTodo(id){//할 일 삭제
                    let index = this.todolist.findIndex((item)=> id === item.id);
                    this.todolist.splice(index,1);
                },
                toggleCompleted(id){//할 일 완료 지정
                    let index = this.todolist.findIndex((item)=> id === item.id);
                    this.todolist[index].completed = !this.todolist[index].completed;
                }
            }
        })
        vm.mount('#app');
    </script>
</body>
</html>
