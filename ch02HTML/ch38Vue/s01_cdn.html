<!--
Vuejs는 전형적인 MVVM 패턴을 따름. MVVM 패턴은 
Model-View-ViewModel를 의미함.

MVVM 패턴은 애플리케이션 로직과 UI의 분리를 위해 설계된 패턴
Model : 데이터
View : HTML과 CSS로 작성
View Model : View의 실제 논리 및 데이터 흐름을 담당

Vue는 데이터가 변경되면 Virtual DOM을 이용해 효율적으로
UI를 다시 렌더링

-->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuejs</title>
</head>
<body>
    <!--Vue 애플리케이션이 적용될 영역(루트 DOM)-->
    <div id="app">
        <!--템플릿 표현식(콧수염 표현식 : Mustache Expression)-->
        <!--data()에서 정의한 message 값을 화면에 출력-->
        <h2>{{message}}</h2>
    </div>
    <!--Vue 라이브러리를 CDN 방식으로 로드-->
    <script type="text/javascript" src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
        //Vue 애플리케이션 생성
        Vue.createApp({
            //컴포넌트가 관리하고 추적해야 할 데이터를
            //등록할 때 사용

            //Vue 컴포넌트에서 사용하는 반응형 데이터 정의
            //반응형 데이터(Reactive Data)는 데이터가 변경되면
            //그 데이터를 사용하는 UI(View)가 자동으로 다시
            //갱신되는 데이터를 의미
            data(){
                //View에서 사용할 데이터 객체 반환
                return {
                    message:'Hello Vue'
                }
            }
        })
        //mount()
        //Vue 애플리케이션을 실제 DOM 요소에 연결
        //'#app' 요소 내부가 Vue의 관리 영역이 됨
        .mount('#app');
    </script>
</body>
</html>
