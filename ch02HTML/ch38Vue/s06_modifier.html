<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuejs</title>
</head>
<body>
    <!--Vue 애플리케이션이 적용될 영역(루트 DOM)-->
    <div id="app">
       <!--
       v-model 디렉티브는 아래와 같은 수식어(Modifier)를 지원
       lazy:입력폼에서 다른 요소로 포커스가 이동하는 이벤트가
            발생할 때 입력한 값을 데이터와 동기화함
       number:이 수식어를 지정하면 숫자가 입력될 경우 number타입
              의 값으로 자동 형변환되어 데이터 옵션 값으로 반영
              결과가 parseInt() 함수로 문자열을 숫자로 형변환한
              결과와 동일
       trim:이 수식어를 지정하면 문자열의 앞뒤 공백을 자동으로
            제거함
       v-model.trim.lazy 와 같이 한 번에 여러 개를 부여할 수도 
       있음              
       -->
       <input type="text" v-model.number="num">
       <!--
       100 입력 - 결과 : 100, 100abc 입력 -> 결과 : 100
       abc100 입력 - 결과 : abc100
       -->
       <br>
       입력된 수 : <span>{{num}}</span><br><br>

       <input type="text" v-model.trim="name">
       <br>
       입력된 이름:<span>{{name}}</span>
    </div>
    <!--Vue 라이브러리를 CDN 방식으로 로드-->
    <script type="text/javascript" src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
        //Vue 애플리케이션 생성
        Vue.createApp({
            //컴포넌트가 관리하고 추적해야 할 데이터를
            //등록할 때 사용

            //Vue 컴포넌트에서 사용하는 반응형 데이터 정의
            //반응형 데이터(Reactive Data)는 데이터가 변경되면
            //그 데이터를 사용하는 UI(View)가 자동으로 다시
            //갱신되는 데이터를 의미
            data(){
                //View에서 사용할 데이터 객체 반환
                return {
                    num:0,
                    name:""
                }
            }
        })
        //mount()
        //Vue 애플리케이션을 실제 DOM 요소에 연결
        //'#app' 요소 내부가 Vue의 관리 영역이 됨
        .mount('#app');
    </script>
</body>
</html>
