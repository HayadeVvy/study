<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuejs</title>
    <style type="text/css">
        #list {width:600px;border:1px solid black;border-collapse:collapse;}
        #list td, #list th {border:1px solid black;text-align:center;}
        #list > thead > tr {color:yellow;background-color:purple;}
    </style>
</head>
<body>
    <!--
    v-for 디렉티브를 이용해서 많은 데이터를 출력할 때 콧수염
    표현식이 화면에 일시적으로 나타나는 경우가 있음.이것은
    Vue 인스턴스가 템플릿을 컴파일할 때 발생하는 시간 때문에
    일어나는 현상.
    v-cloak를 사용하면 화면 초기에는 컴파일되지 않는 템플릿은
    나타나지 않도록 할 수 있음.
    -->
    <!--Vue 애플리케이션이 적용될 영역(루트 DOM)-->
    <div id="app" v-cloak>
        <table id="list">
            <thead>
                <tr>
                    <th>번호</th><th>이름</th><th>전화번호</th>
                </tr>
                <tbody id="contacts">
                    <!--index 필요시 (contact,index) in contacts도 가능-->
                    <tr v-for="contact in contacts" :key="contact.no">
                        <td>{{contact.no}}</td>
                        <td>{{contact.name}}</td>
                        <td>{{contact.tel}}</td>
                    </tr>
                </tbody>
            </thead>
        </table>
    </div>
    <!--Vue 라이브러리를 CDN 방식으로 로드-->
    <script type="text/javascript" src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
        //Vue 애플리케이션 생성
        Vue.createApp({
            //컴포넌트가 관리하고 추적해야 할 데이터를
            //등록할 때 사용

            //Vue 컴포넌트에서 사용하는 반응형 데이터 정의
            //반응형 데이터(Reactive Data)는 데이터가 변경되면
            //그 데이터를 사용하는 UI(View)가 자동으로 다시
            //갱신되는 데이터를 의미
            data(){
                //View에서 사용할 데이터 객체 반환
                return {
                   "pageno":1,
                   "pagesize":4,
                   "totalcount":100,
                   "contacts":[
                        {"no":1011,"name":"홍길동","tel":"010-1234-5678"},
                        {"no":1012,"name":"박문수","tel":"010-1234-5678"},
                        {"no":1013,"name":"장영실","tel":"010-1234-5678"},
                        {"no":1014,"name":"김유신","tel":"010-1234-5678"}
                   ]
                }
            }
        })
        //mount()
        //Vue 애플리케이션을 실제 DOM 요소에 연결
        //'#app' 요소 내부가 Vue의 관리 영역이 됨
        .mount('#app');
    </script>
</body>
</html>
