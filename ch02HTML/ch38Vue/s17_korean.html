<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuejs</title>
    <style type="text/css">
        #list {width:600px;border:1px solid black;border-collapse:collapse;}
        #list td, #list th {border:1px solid black;text-align:center;}
        #list > thead > tr {color:yellow;background-color:purple;}
    </style>
</head>
<body>
    <!--Vue 애플리케이션이 적용될 영역(루트 DOM)-->
    <div id="app">
       <!--
       한글의 경우 글자의 완성이 완료되어야 데이터에 반영되는
       문제점 해결 
       -->
       <input id="b" type="text" :value="name"
                                     @input="changeName">
       <br>
       입력하신 이름 : <span>{{name}}</span>
       <br>
       <h4>화살표 함수 사용</h4>
       <input id="b" type="text" :value="name2"
          @input="(e) => this.name2 = e.target.value">
        <br>
        입력하신 이름 : <span>{{name2}}</span>  
        <h4>전통 함수 사용</h4>
        <input id="b" type="text" :value="name3"
           @input="function(e){name3 = e.target.value}"> 
        <br>
        입력하신 이름 : <span>{{name3}}</span>                                
    </div>
    <!--Vue 라이브러리를 CDN 방식으로 로드-->
    <script type="text/javascript" src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
        //Vue 애플리케이션 생성
        Vue.createApp({
            //컴포넌트가 관리하고 추적해야 할 데이터를
            //등록할 때 사용

            //Vue 컴포넌트에서 사용하는 반응형 데이터 정의
            //반응형 데이터(Reactive Data)는 데이터가 변경되면
            //그 데이터를 사용하는 UI(View)가 자동으로 다시
            //갱신되는 데이터를 의미
            data(){
                //View에서 사용할 데이터 객체 반환
                return {
                  name:"",
                  name2:"",
                  name3:""
                }
            },
            methods:{
               changeName(e){
                    this.name = e.target.value;
               }
            }
        })
        //mount()
        //Vue 애플리케이션을 실제 DOM 요소에 연결
        //'#app' 요소 내부가 Vue의 관리 영역이 됨
        .mount('#app');
    </script>
</body>
</html>
