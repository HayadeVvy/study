<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Link Style</title>
        <link rel="stylesheet" href="style.css"
         type="text/css">
        <!--
        link : 외부 리소스 링크
        rel : 현재 문서와 외부 리소스 사이의 
              관계를 명시
              값 예시)
              icon : 사용자 인터페이스에서 해당
              문서를 나타낼 리소스(일반적으로
              아이콘)을 불러옴
              stylesheet : 스타일 시트
              (stylesheet)로 사용할 외부 리소스를
              불러옴.
              
        --> 
    </head>
    <body>
        <!--링크 스타일 : 스타일이 명시된
        별도의 파일을 링크하는 방식-->
        <span>봄이 오는 소리</span>
    </body>
</html>
