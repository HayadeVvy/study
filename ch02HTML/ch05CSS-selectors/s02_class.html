<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>클래스선택자</title>
        <style type="text/css">
            /*복수의 태그에 클래스선택자를 지정할
            수 있음*/
            .main-ft{color:blue;background-color:yellow;}
            .main-sp{font-size:30pt;}
        </style>
    </head>
    <body>
        <div class="main-ft">기분 좋은 하루</div>
        <br>
        <span class="main-ft">2월 중순</span
        <br>
        <!--공백을 구분자로 여러개의 클래스를 적용할
        수 있음-->
        <p class="main-ft main-sp">기분 좋은 하루</p>
        <br>
        <span class="main-sp">2월 중순</span>    
    </body>
</html>
