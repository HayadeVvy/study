<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습</title>
</head>
<body>
    <script type="text/javascript">
        /*
        [실습]
        이름 수입 지출 세금(5%,getTax),잔액(getBalance,세금 공제)
        홍길동 3000 2500
        박문수 5000 1100
        장영실 4000 3600
        김유신 7000 4200
        */
        const member = [];
        member.push({이름:'홍길동',수입:3000,지출:2500});
        member.push({이름:'박문수',수입:5000,지출:1100});
        member.push({이름:'장영실',수입:4000,지출:3600});
        member.push({이름:'김유신',수입:7000,지출:4200});

        //생성된 객체에 메서드 정의
        for(let i in member){
            //세금을 구하는 메서드 
            member[i].getTax = function(){
                return this.수입 * 0.05;
            };
            //잔액을 구하는 메서드
            member[i].getBalance = function(){
                return this.수입 
                        - this.getTax() - this.지출;
            };
            //출력용 메서드
            member[i].toString = function(){
                return this.이름 + ', ' + this.수입 
                 + ', ' + this.지출 + ', ' 
                 + this.getTax() + ', ' 
                 + this.getBalance();
            };
        }//end of for;

        let output = 
                    '이름, 수입, 지출, 세금, 잔액<br>';
        for(let i in member){
            output += member[i].toString() + '<br>';
        }          
        document.write(output);
    </script>
</body>
</html>
