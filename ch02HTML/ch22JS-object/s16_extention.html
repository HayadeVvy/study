<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상속</title>
</head>
<body>
    <script type="text/javascript">
        /*
        자바스크립트는 프로토타입을 이용하여
        상속 구현
        */
       function Human(age){
        //상속 대상이 아님
        this.age = age;
       }
       //프로토타입에 정의된 속성과 메서드만
       //상속 대상
       Human.prototype.type = '사람';
       Human.prototype.getType = function(){
            return this.type;
       };
       Human.prototype.getAge = function(){
            return this.age;
       }

       //Human를 Student에 상속
       function Student(age){
            this.age = age;
       }
       //Student.prototype = new Human();동일한 표현
       Student.prototype = Human.prototype;
       //프로토타입의 생성자를 재정의
       //(정의하지 않아도 구동상의 문제는 없음)
       Student.prototype.constructor = Student;

       const student = new Student(40);
       document.write('student.type = ' 
                     + student.type + '<br>');
       document.write('student.getType() = ' 
                     + student.getType() + '<br>');
       document.write('student.constructor.name = '
                     + student.constructor.name + '<br>');
       document.write('student.getAge() + ' 
                     + student.getAge() + '<br>');   
       document.write('-----------<br>');
       
       document.write(student instanceof Student);
       document.write('<br>');
       document.write(student instanceof Human);
       document.write('<br>');
       document.write(student instanceof Object);
       document.write('<br>');

    </script>
</body>
</html>
