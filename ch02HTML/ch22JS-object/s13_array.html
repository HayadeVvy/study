<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배열에 객체 저장</title>
</head>
<body>
    <script type="text/javascript">
        function Student(name,korean,math,english){
            //속성 지정
            this.name = name;
            this.korean = korean;
            this.math = math;
            this.english = english;
            //메서드 지정
            this.getSum = function(){
                return this.korean + this.math 
                              + this.english;
            };
            this.getAverage = function(){
                return this.getSum()/3;
            };
            this.toString = function(){
                return this.name + ', ' + this.getSum() 
                         + ', ' + this.getAverage();
            };
        }

        //학생 정보를 저장하는 배열을 생성
        const students = [];
        students.push(new Student('홍길동',99,98,97));
        students.push(new Student('박문수',98,98,97));
        students.push(new Student('장영실',97,98,97));
        students.push(new Student('김유신',96,98,97));

        //출력
        let output = '이름, 총점, 평균<br>';
        //for in 반복문을 이용한 출력
        for(let i in students){
            output += students[i].toString() + '<br>';
        }
        document.write(output);

    </script>
</body>
</html>
