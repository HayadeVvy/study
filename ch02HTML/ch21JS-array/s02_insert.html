<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배열의 요소 추가</title>
</head>
<body>
    <script type="text/javascript">
        //자바스크립트의 배열은 가변 길이기
        //때문에 요소의 추가,삭제 가능
        //배열 생성
        const array = ['포도','사과'];
                       // 0     1
        //배열명을 호출하면 배열의 요소를
        //쉼표(,)로 구분해서 문자열로 반환
        document.write(array + '<br>');               

        //인덱스 2에 요소를 대입해서 요소의
        //개수가 늘어나게 함
        array[2] = '사과';

        document.write(array + '<br>');

        //인덱스 10에 요소를 대입하면
        //요소의 개수 11이 됨
        array[10] = '망고';
        document.write(
          '배열의 길이 :' + array.length + '<br>');

        document.write(
            '배열 요소 목록 : ' + array + '<br>');
        
        //건너뛴 요소에 접근하면 undefined 값이
        //반환    
        document.write(array[4] + '<br>');    
    </script>
</body>
</html>
