<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery 연결</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script type="text/javascript">
        //문서가 준비 완료되면 매개변수로 전달된 함수를 실행하라는 의미
        $(document).ready(function(){
/*
기본 필터 선택자
선택자 형태         설명
요소:odd        홀수 번째에 위치한 문서 객체를 선택
요소:even       짝수 번째에 위치한 문서 객체를 선택
요소:first      첫 번째 위치한 문서 객체를 선택
요소:last       마지막에 위치한 문서 객체를 선택
*/
            $('tr:odd').css('background','yellow');
            $('tr:even').css('background','pink');
            $('tr:first').css('background','#000000')
                         .css('color','#FFFFFF');

            $('h3:even').css({
                backgroundColor:'black',
                color:'white'
            });             
        });
    </script>
</head>
<body>
    <table>
        <tr>
            <th>이름</th><th>혈액형</th><th>지역</th>
        </tr>
        <tr>
            <td>강민수</td><td>AB형</td><td>서울</td>
        </tr>
        <tr>
            <td>홍길동</td><td>A형</td><td>부산</td>
        </tr>
        <tr>
            <td>박문수</td><td>B형</td><td>대구</td>
        </tr>
        <tr>
            <td>장영실</td><td>AB형</td><td>인천</td>
        </tr>
        <tr>
            <td>김유신</td><td>O형</td><td>부산</td>
        </tr>
    </table>

    <h3>Header-0</h3>
    <h3>Header-1</h3>
    <h3>Header-2</h3>
    <h3>Header-3</h3>
    <h3>Header-4</h3>
    <h3>Header-5</h3>
</body>
</html>
