<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!--모바일 장치에서 웹사이트가 원하는 사이즈로 보여지게 처리-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style type="text/css">
        div{
            border:1px solid #CCCCCC;
            background:#EEEEEE;
        }
    </style>
</head>
<body>
    <h4>container - 좌우에 여백이 있음</h4>
    <div class="container">내용</div>

<!--
            Extra small Small   Medium  Large   X-Large   XX-Large
            <567px      >=576px >=768px >=992px >=1200px  >=1400px
.container
.container-sm
.container-md
.container-lg
.container-xl
.container-xxl
.container-fluid  <-- 꽉 찬 형태의 영역               
-->
    <h4>모니터 해상도에 따른 container 적용</h4>
    <div class="container-sm">container-sm</div>
    <div class="container-md">container-md</div>
    <div class="container-lg">container-lg</div>
    <div class="container-xl">container-xl</div>
    <div class="container-xxl">container-xxl</div>
    <p>
    
    <h4>container-fluid - viewport를 꽉 채운 container</h4>
    <div class="container-fluid">container-fluid</div>    

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
