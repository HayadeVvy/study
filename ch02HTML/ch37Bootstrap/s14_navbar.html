<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!--모바일 장치에서 웹사이트가 원하는 사이즈로 보여지게 처리-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h4>기본 Navbar</h4>
        <!--<nav class="navbar navbar-expand-lg navbar-light bg-light">-->
        <!--배경색 지정-->
        <nav class="navbar navbar-expand-lg navbar-light" style="background-color:#e3f3fd;">    
            <div class="container-fluid">
                <a href="#" class="navbar-brand">Navbar</a> 
                <button class="navbar-toggler" type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button> 
                <!--메뉴 시작-->
                <div class="collapse navbar-collapse"
                      id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a href="#" class="nav-link active">Home</a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link">About</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#"
                               id="navbarDropdown" data-bs-toggle="dropdown">
                                Dropdown
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">모자</a></li>
                                <li><a class="dropdown-item" href="#">가방</a></li>
                                <li><a class="dropdown-item" href="#">구두</a></li>
                                <li class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="#">샌들</a></li>
                            </ul>
                        </li>
                    </ul>
                    <form class="d-flex">
                        <input class="form-control me-2" type="search"
                          placeholder="Search">
                        <button class="btn btn-outline-success"
                            type="submit">Search</button>  
                    </form>
                </div>
                <!--메뉴 끝-->     
            </div>
        </nav>
    </div>                
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
