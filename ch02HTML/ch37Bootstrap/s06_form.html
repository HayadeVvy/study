<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!--л™®л∞ФмЭЉ мЮ•мєШмЧРмДЬ мЫємВђмЭінКЄк∞А мЫРнХШлКФ мВђмЭім¶Ил°Ь л≥імЧђмІАк≤М м≤Шл¶ђ-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h4>кЄ∞л≥Є form</h4>
        <form>
            <div class="mb-3"><!--mb-3:мЪФмЖМмЭШ лІ® мХДлЮШмЧР 1remмЭШ мЧђл∞±-->
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password">
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>

        <h4>Horizontal form</h4>
        <form>
            <div class="row mb-3">
                <label for="email2" 
                  class="col-sm-2 col-form-label">Email</label>
                <div class="col-sm-10">
                    <input type="email" class="form-control"
                           id="email2">
                </div>  
            </div>
            <div class="row mb-3">
                <label for="password2" class="col-sm-2 
                                col-form-label">Password</label>
                <div class="col-sm-10">
                    <input type="password" class="form-control"
                        id="password2">
                </div>                
            </div>
            <button type="submit" class="btn btn-primary">м†ДмЖ°</button>
        </form>

        <h4>Floating labels</h4>
        <form>
            <div class="form-floating mb-3">
                <input type="email" class="form-control"
                     id="email3" placeholder="name@example.com">
                <label for="email3">Email address</label>     
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control"
                   id="password3" placeholder="Password">
                <label for="password3">Password</label>   
            </div>
            <button type="submit" class="btn btn-primary">м†ДмЖ°</button>
        </form>
    </div>                
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
