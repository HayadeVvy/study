<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!--모바일 장치에서 웹사이트가 원하는 사이즈로 보여지게 처리-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h4>기본 Carousel</h4>
        <div id="carouselExample" class="carousel slide"
             data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="../files/Koala02.jpg" class="d-block w-100">
                    <div class="carousel-caption">
                        <h5>호주에 사는 코알라</h5>
                        <p>호주에 사는 코알라의 개체수가 감소하고 있다.</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="../files/Penguins02.jpg" class="d-block w-100">
                    <div class="carousel-caption">
                        <h5>남극에 사는 펭귄</h5>
                        <p>남극에 사는 펭귄의 개체수가 감소하고 있다.</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="../files/Lighthouse02.jpg" class="d-block w-100">
                    <div class="carousel-caption">
                        <h5>등대의 불빛</h5>
                        <p>어부들에게 등배의 불빛은 길잡이 역할을 한다.</p>
                    </div>
                </div>
            </div><!--end of .carousel-inner-->  
            <button class="carousel-control-prev" type="button"
              data-bs-target="#carouselExample"
              data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
                <span class="visually-hidden">Previous</span>
            </button> 
            <button class="carousel-control-next" type="button"
              data-bs-target="#carouselExample"
              data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
                <span class="visually-hidden">Next</span>
            </button> 
        </div> 
        
        <h4>Crossfade</h4>
        <div id="carouselExample2" class="carousel slide carousel-fade"
             data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExample2" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#carouselExample2" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#carouselExample2" data-bs-slide-to="2"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="../files/Koala02.jpg" class="d-block w-100">
                    <div class="carousel-caption">
                        <h5>호주에 사는 코알라</h5>
                        <p>호주에 사는 코알라의 개체수가 감소하고 있다.</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="../files/Penguins02.jpg" class="d-block w-100">
                    <div class="carousel-caption">
                        <h5>남극에 사는 펭귄</h5>
                        <p>남극에 사는 펭귄의 개체수가 감소하고 있다.</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="../files/Lighthouse02.jpg" class="d-block w-100">
                    <div class="carousel-caption">
                        <h5>등대의 불빛</h5>
                        <p>어부들에게 등배의 불빛은 길잡이 역할을 한다.</p>
                    </div>
                </div>
            </div><!--end of .carousel-inner-->  
            <button class="carousel-control-prev" type="button"
              data-bs-target="#carouselExample2"
              data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
                <span class="visually-hidden">Previous</span>
            </button> 
            <button class="carousel-control-next" type="button"
              data-bs-target="#carouselExample2"
              data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
                <span class="visually-hidden">Next</span>
            </button> 
        </div>

    </div>                
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
