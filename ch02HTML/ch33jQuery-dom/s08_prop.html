<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery 연결</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script type="text/javascript">
        //문서가 준비 완료되면 매개변수로 전달된 함수를 실행하라는 의미
       //=$(document).ready(function(){});
       $(function(){
            //prop() : 선택한 요소의 속성 제어
            $('#st_1').prop('title','단락 태그');
            $('#txt1').text($('#st_1').prop('title'));
            $('#txt2').text($('#st_1').prop('tagName'));
            $('#txt3').text($('#sel').prop('selectedIndex'));
       });
    </script>
</head>
<body>
   <p id="st_1">내용1</p>
   <p id="txt1"></p>
   <p id="txt2"></p> 
   <select id="sel">
    <option value="naver">네이버</option>
    <option value="daum" selected="selected">다음</option>
    <option value="google">구글</option>
   </select>
   <p id="txt3"></p>
</body>
</html>
