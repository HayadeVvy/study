<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>text-overflow</title>
        <style type="text/css">
            div{
                width:100px;
                border:1px solid black;
                white-space: nowrap;/*공백,줄바꿈 불인정*/
                /*div를 벗어난 데이터 표시 방법 지정*/
                overflow: hidden;/*div를 벗어난 데이터를 숨김*/
                /*
                text-overflow 속성값
                clip이 넘치는 텍스트를 잘바버림(기본값)
                ellipsis (말줄임표) ... 표시
                */
                text-overflow: ellipsis;
            }
        </style>
    </head>
    <body>
        <div>
            엘리먼트가 잘리거나 부모 엘리먼트의 너비 및 높이
            엘리먼트가 잘리거나 부모 엘리먼트의 너비 및 높이
        </div>    
    </body>
</html>
