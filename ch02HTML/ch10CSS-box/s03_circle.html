<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>border-radius를 이용한 원 그리기</title>
        <style type="text/css">
            .circle1{
                background-color: #C60;
                width:200px;
                height:200px;
                border-radius: 100px;
            }
            .circle2{
                background-color: #FFFFFF;
                border:solid 3px #A72525;
                width:200px;
                height:200px;
                border-radius: 100px;
            }
        </style>
    </head>
    <body>
        <div class="circle1"></div>
        <div class="circle2"></div>
    </body>
</html>
