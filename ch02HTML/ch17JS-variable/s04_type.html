<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자바스크립트의 자료형</title>
</head>
<body>
    <script type="text/javascript">
        /*
        숫자형:숫자(정수,실수)를 표현하는 자료형
        문자형:작은따옴표('') 또는 큰따옴표("")를
               양 끝에 두고, 그 안에 한 글자
               이상의 문자,기호 또는 숫자가 
               있는 자료형
        불린형:참(true),거짓(false)         
        */

        //변수 선언 및 초기화
        var numberVar = 273;//숫자
        var stringVar = '서울';//문자
        var booleanVar = true;//boolean
        var functionVar = function(){};//함수
        var objectVar = {};//객체
        var arrayVar = [];//배열

        //typeof 변수명 : 해당 변수에 저장된
        //               데이터의 타입을 알아내는
        //               연산자
        document.write('numberVar : ' + 
                    typeof numberVar + '<br>');
        document.write('stringVar : ' +
                    typeof stringVar + '<br>');
        document.write('booleanVar : ' + 
                    typeof booleanVar + '<br>');
        document.write('functionVar : ' + 
                    typeof functionVar + '<br>');
        document.write('objectVar : ' + 
                    typeof objectVar + '<br>'); 
        document.write('arrayVar : ' + 
                    typeof arrayVar + '<br>');                                                           
        
        //null은 비어 있는, 존재하지 않는 값을 의미함
        var nullVar = null; 
        var undefinedVar;//undefined

        document.write('nullVar : ' + 
                typeof nullVar + '<br>');
        document.write('undefinedVar : ' + 
                typeof undefinedVar);
    </script>
</body>
</html>
